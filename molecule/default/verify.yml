---
- name: Verify YaCy systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for YaCy service to become active (up to 180s)
      ansible.builtin.systemd:
        name: yacy.service
      register: yacy_service
      until: yacy_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert YaCy service is active
      ansible.builtin.assert:
        that: yacy_service.status.ActiveState == 'active'
        fail_msg: "yacy.service not active ({{ yacy_service.status.ActiveState }})"
        success_msg: "yacy.service is active"

    - name: Retrieve YaCy service log for debugging
      when: yacy_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu yacy.service
      changed_when: false

    - name: Wait for YaCy HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:8090/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: yacy_endpoint
      until: yacy_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert YaCy HTTP endpoint responds
      ansible.builtin.assert:
        that: yacy_endpoint.status in [200, 302]
        fail_msg: "YaCy did not respond as expected ({{ yacy_endpoint.status | default('no response') }})"
        success_msg: "YaCy responded with {{ yacy_endpoint.status }}"

    - name: Show YaCy systemd service status summary
      ansible.builtin.debug:
        msg:
          - "YaCy systemd: {{ yacy_service.status.ActiveState }}"
          - "YaCy HTTP: {{ yacy_endpoint.status }}"
